name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check all source files
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py'):
                      fp = os.path.join(root, f)
                      try:
                          ast.parse(open(fp, encoding='utf-8').read())
                      except SyntaxError as e:
                          errors.append(f'{fp}: {e}')
          if errors:
              print(f'Syntax errors in {len(errors)} files:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'All source files pass syntax check')
          "

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short
